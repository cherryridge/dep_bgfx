name: Build on Windows

on:
    workflow_call:
        inputs:
            commit-sha:
                type: string
                required: true
        outputs:
            runid:
                value: ${{github.run_id}}
    workflow_dispatch:
        inputs:
            commit-sha:
                type: string
                description: Target commit
                required: true

jobs:
    build:
        runs-on: windows-latest
        steps:

          - name: Checkout BGFX
            uses: actions/checkout@v4
            with:
                repository: bkaradzic/bgfx
                path: bgfx
        
          - name: Checkout BX
            uses: actions/checkout@v4
            with:
                repository: bkaradzic/bx
                path: bx

          - name: Checkout BIMG
            uses: actions/checkout@v4
            with:
                repository: bkaradzic/bimg
                path: bimg

          - name: Get MSBuild
            uses: microsoft/setup-msbuild@v3

          - name: Install ARM64 Windows SDK
            uses: ChristopheLav/windows-sdk-install@v1.0.4
            with:
                version-sdk: 26100
                features: "OptionId.DesktopCPParm64"

          - name: Build Windows x64 Debug
            shell: pwsh
            run: |
                cd bgfx
                ..\bx\tools\bin\windows\genie.exe --platform=x64 vs2022
                $env:CL = "/Zi /Od /FC $env:CL"
                $env:LINK = "/DEBUG:FULL $env:LINK"
                msbuild ".build/projects/vs2022/bgfx.sln" /m /p:Configuration=Debug /p:Platform=x64 /p:PlatformToolset=ClangCL /p:UseLldLink=true

          - name: Build Windows x64 Release
            shell: pwsh
            run: |
                cd bgfx
                ..\bx\tools\bin\windows\genie.exe --with-tools --platform=x64 vs2022
                msbuild ".build/projects/vs2022/bgfx.sln" /m /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=ClangCL /p:UseLldLink=true

          - name: Delete Projects
            shell: pwsh
            run: |
                cd bgfx
                del -r .build\projects

          - name: Build Windows arm64 Debug
            shell: pwsh
            run: |
                cd bgfx
                ..\bx\tools\bin\windows\genie.exe --platform=ARM64 vs2022
                $env:CL = "/DWINVER=0x0A00 /D_WIN32_WINNT=0x0A00 /Zi /Od /FC $env:CL"
                $env:LINK = "/DEBUG:FULL $env:LINK"
                msbuild ".build/projects/vs2022/bgfx.sln" /m /p:Configuration=Debug /p:Platform=ARM64 /p:PlatformToolset=ClangCL /p:UseLldLink=true

          - name: Build Windows arm64 Release
            shell: pwsh
            run: |
                cd bgfx
                msbuild ".build/projects/vs2022/bgfx.sln" /m /p:Configuration=Release /p:Platform=ARM64 /p:PlatformToolset=ClangCL /p:UseLldLink=true

          - name: Compress Product
            shell: pwsh
            run: |
                echo ${{inputs.commit-sha}} >> VERSION.txt
                mkdir temp\include
                cp -r bgfx\include\* temp\include
                cp -r bx\include\* temp\include
                cp -r bimg\include\* temp\include
                mkdir temp\bin
                cp .\bgfx\.build\win64_vs2022\bin\shadercRelease.exe .\temp\bin\shaderc.exe
                cp .\bgfx\tools\bin\windows\d3dcompiler_47.dll .\temp\bin\d3dcompiler_47.dll
                cp .\bgfx\tools\bin\windows\dxcompiler.dll .\temp\bin\dxcompiler.dll
                cp .\bgfx\tools\bin\windows\dxil.dll .\temp\bin\dxil.dll
                7z a bgfx_windows_x64_debug.7z .\bgfx\.build\win64_vs2022\bin\bgfxDebug.lib .\bgfx\.build\win64_vs2022\bin\bxDebug.lib .\bgfx\.build\win64_vs2022\bin\bimgDebug.lib .\temp\include .\temp\bin VERSION.txt
                7z a bgfx_windows_x64_release.7z .\bgfx\.build\win64_vs2022\bin\bgfxRelease.lib .\bgfx\.build\win64_vs2022\bin\bxRelease.lib .\bgfx\.build\win64_vs2022\bin\bimgRelease.lib .\temp\include .\temp\bin VERSION.txt
                7z a bgfx_windows_arm64_debug.7z .\bgfx\scripts\bgfxDebug.lib .\bx\scripts\bxDebug.lib .\bimg\scripts\bimgDebug.lib .\temp\include .\temp\bin VERSION.txt
                7z a bgfx_windows_arm64_release.7z .\bgfx\scripts\bgfxRelease.lib .\bx\scripts\bxRelease.lib .\bimg\scripts\bimgRelease.lib .\temp\include .\temp\bin VERSION.txt

          - name: Upload Archive
            uses: actions/upload-artifact@v4
            with:
                name: bgfx_windows
                path: |
                    *.7z
                retention-days: 7